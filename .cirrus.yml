task:
  name: "Infinity_X_2.9_Joe_Fast_Build"
  timeout_in: 120m
  arm_container:
    image: ubuntu:22.04
    cpu: 8
    memory: 24G

  setup_script:
    - apt-get update
    - apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev libc6-dev libncurses5 x11proto-core-dev libx11-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig ccache bc libssl-dev rsync python3 python3-pip ninja-build python-is-python3 libxml2 aria2 git-lfs openjdk-17-jdk imagemagick libelf-dev libncursesw5-dev libghc-zlib-dev lz4 liblz4-tool pigz openssh-client sudo
    - mkdir -p ~/bin
    - curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
    - chmod a+x ~/bin/repo
    - export PATH="$HOME/bin:$PATH"

  sync_script:
    - export PATH="$HOME/bin:$PATH"
    # السطر ده بيمنع جيتهاب يطلب باسورد ويخزوقنا
    - export GIT_TERMINAL_PROMPT=0
    - mkdir -p ~/android && cd ~/android
    - git config --global user.email "joe@alexandria.com"
    - git config --global user.name "Joe"
    
    # تحميل سورس إنفينيتي السريع
    - repo init -u https://github.com/ProjectInfinity-X/manifest -b 15 --depth=1
    - repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune
    
    # تحميل ملفات T505N من جيتهاب (لينيج وماپيتس)
    # بيحاول يسحب فرع 22.1، لو ملقاهوش بياخد 21.0 فوراً عشان ميوقفش
    - git clone --depth=1 -b lineage-22.1 https://github.com/LineageOS/android_device_samsung_gta4l device/samsung/gta4l || git clone --depth=1 -b lineage-21.0 https://github.com/LineageOS/android_device_samsung_gta4l device/samsung/gta4l
    - git clone --depth=1 -b lineage-22.1 https://github.com/LineageOS/android_device_samsung_gta4l-common device/samsung/gta4l-common || git clone --depth=1 -b lineage-21.0 https://github.com/LineageOS/android_device_samsung_gta4l-common device/samsung/gta4l-common
    - git clone --depth=1 -b lineage-22.1 https://github.com/LineageOS/android_kernel_samsung_gta4l kernel/samsung/gta4l || git clone --depth=1 -b lineage-21.0 https://github.com/LineageOS/android_kernel_samsung_gta4l kernel/samsung/gta4l
    
    - git clone --depth=1 -b lineage-22.1 https://github.com/TheMuppets/proprietary_vendor_samsung_gta4l vendor/samsung/gta4l || git clone --depth=1 -b lineage-21.0 https://github.com/TheMuppets/proprietary_vendor_samsung_gta4l vendor/samsung/gta4l
    - git clone --depth=1 -b lineage-22.1 https://github.com/TheMuppets/proprietary_vendor_samsung_gta4l-common vendor/samsung/gta4l-common || git clone --depth=1 -b lineage-21.0 https://github.com/TheMuppets/proprietary_vendor_samsung_gta4l-common vendor/samsung/gta4l-common
    
    - git clone --depth=1 -b lineage-22.1 https://github.com/LineageOS/android_hardware_samsung hardware/samsung || git clone --depth=1 -b lineage-21.0 https://github.com/LineageOS/android_hardware_samsung hardware/samsung

  build_script:
    - export PATH="$HOME/bin:$PATH"
    - cd ~/android
    - source build/envsetup.sh
    - lunch infinity_gta4l-userdebug || lunch lineage_gta4l-userdebug
    - mka infinity -j$(nproc --all)

  upload_script:
    - cd ~/android/out/target/product/gta4l/
    - ROM_FILE=$(ls Infinity-X*.zip | head -n 1)
    - curl https://bashupload.com/ -T "$ROM_FILE" > ~/link.txt
    - cat ~/link.txt
